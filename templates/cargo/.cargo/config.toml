[build]
target-dir = "target"

[alias]
bin = ["run", "--package", "cargo-bin", "--"]

# Full workspace validation (slow; use only for pre-push/CI)
build-all = ["build", "--workspace", "--all-targets", "--all-features"]
clippy-all = ["clippy", "--workspace", "--all-targets", "--all-features"]
fmt-check = ["fmt", "--all", "--", "--check"]
test-all = ["run", "--package", "cargo-bin", "--", "cargo-nextest", "run", "--workspace", "--all-targets", "--all-features"]

# Targeted validation (recommended for most development)
build-pkg = ["build", "--all-targets", "--all-features", "-p"]
clippy-pkg = ["clippy", "--all-targets", "--all-features", "-p"]
test-pkg = ["run", "--package", "cargo-bin", "--", "cargo-nextest", "run", "--all-targets", "--all-features", "-p"]
