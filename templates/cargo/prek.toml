# Prek native configuration: preferred as the canonical configuration for pre-commit-style hooks.
# Prek is a Rust-based, drop-in replacement for pre-commit with support for TOML config.
# Configuration mirrors project conventions: baseline checks, formatting, linting, and CI validation.
# For details on prek, see: https://prek.j178.dev/
# Note: `prek` can also read `.pre-commit-config.yaml` for compatibility, but `prek.toml` is preferred.

default_install_hook_types = ["commit-msg", "pre-commit", "pre-push"]
default_stages = ["pre-commit"]

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks.git"
rev = "3e8a8703264a2f4a69428a0aa4dcb512790b2c8c"
# Notes:
# - These hooks are a recommended baseline. If a particular hook is undesired (for example, forbidding
#   submodules in a repository that intentionally uses them), remove or configure that hook in `prek.toml`.
# - Keep hook repositories pinned (set `rev`) to an explicit commit hash to ensure reproducible behaviour.
hooks = [
  { id = "check-case-conflict" },
  { id = "check-executables-have-shebangs", exclude = "\\.(bat|cmd|ps1|psd1|psm1|vbs|wsf|wsh)$" },
  { id = "check-illegal-windows-names" },
  { id = "check-merge-conflict" },
  { id = "check-shebang-scripts-are-executable" },
  { id = "check-symlinks" },
  { id = "destroyed-symlinks" },
  { id = "detect-private-key" },
  { id = "end-of-file-fixer" },
  { id = "fix-byte-order-marker" },
  { id = "name-tests-test", args = [
    "--pytest-test-first",
  ] },
  # Preserve markdown hard line breaks (common in docs)
  { id = "trailing-whitespace", args = [
    "--markdown-linebreak-ext=md,mdoc,mdown,mdx,mkd,mkdn,markdown,rmd",
  ] },
]

# Commit message linting using commitlint (Node.js). This uses
# the commitlint-pre-commit-hook bridge so it runs as a commit-msg hook.
# Note: Node.js must be available on developer machines to run this hook.
[[repos]]
repo = "https://github.com/alessandrojcm/commitlint-pre-commit-hook.git"
rev = "1d7031e6d0bbfce76e5a625b0cec24fb22e517a0"
hooks = [
  { id = "commitlint", stages = [
    "commit-msg",
  ], additional_dependencies = [
    "@commitlint/config-conventional",
  ] },
]

[[repos]]
repo = "https://github.com/python-jsonschema/check-jsonschema.git"
rev = "f805888065fdb6162e1f800e50bb9460cbd223d6"
hooks = [{ id = "check-dependabot" }, { id = "check-github-workflows" }]

# Markdown linting using rumdl (high-performance Rust linter). These hooks
# use the official pre-commit bridge which installs rumdl into an isolated
# environment automatically. Keep `.markdownlint.jsonc` for compatibility;
# rumdl auto-discovers and can import markdownlint configs via `rumdl import`.
[[repos]]
repo = "https://github.com/rvben/rumdl-pre-commit.git"
rev = "6246326e7adfedf5f052775ce3722e93e44c7f03"
hooks = [{ id = "rumdl-fmt" }]

# Rust hooks using FeryET/pre-commit-rust. External repo ensures compatibility
# with standard pre-commit ecosystem while maintaining consistent cargo checks
# between local development and CI.
#
# - pre-commit stage: lightweight checks and auto-fixes (fmt) for development velocity
# - pre-push stage: comprehensive checks before pushing upstream (cargo-check, clippy, test-docs)
[[repos]]
repo = "https://github.com/FeryET/pre-commit-rust.git"
rev = "2b764ff13b37a64a57232a99363e6438e8877c5c"
hooks = [
  # fmt: upstream sets pass_filenames: true with args: ["--"], so pre-commit
  # passes changed .rs files as: `cargo fmt -- file1.rs file2.rs`. This gives
  # incremental formatting (only changed files). No overrides needed.
  { id = "fmt" },
  # cargo-check: slow, so only run on pre-push
  { id = "cargo-check", args = [
    "--workspace",
    "--all-targets",
    "--all-features",
  ], stages = [
    "pre-push",
  ] },
  # clippy: slow, so only run on pre-push
  { id = "clippy", args = [
    "--workspace",
    "--all-targets",
    "--all-features",
    "--",
  ], stages = [
    "pre-push",
  ] },
  # test-docs: run doctests only via cargo test (nextest doesn't support doctests).
  # Named distinctively so it can be skipped independently: SKIP=test-docs
  { id = "test", name = "test docs", args = ["--doc", "--workspace"], pass_filenames = false, stages = [
    "pre-push",
  ] },
]

# Nextest: Rust test runner with parallel execution, retries, and better UX.
# Replaces pre-commit-rust's `test` hook. Routes through cargo-run-bin to
# auto-install via cargo-binstall on first run.
[[repos]]
repo = "local"
hooks = [
  { id = "test", name = "test", entry = "cargo run --package cargo-bin -- cargo-nextest run --workspace --all-targets --all-features", language = "system", pass_filenames = false, stages = [
    "pre-push",
  ] },
]
